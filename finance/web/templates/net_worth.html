{% extends "base.html" %}
{% block title %}Net Worth History — Finance{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold mb-4">Net Worth History</h1>

<div id="nw-summary" class="hidden bg-white border border-gray-200 rounded-lg shadow-sm px-5 py-3 mb-4 flex flex-wrap gap-x-6 gap-y-1 items-center text-sm"></div>

<div class="bg-white rounded-lg border border-gray-200 shadow-sm p-6">
  <canvas id="netWorthChart" height="120"></canvas>
</div>

<script>
(function () {
  const raw = {{ chart_data_json | safe }};
  if (!raw.labels.length) {
    document.getElementById('netWorthChart').parentElement.innerHTML =
      '<p class="text-gray-500 text-sm py-4">No balance history data yet. Run a sync to get started.</p>';
    return;
  }

  // Populate summary strip
  const vals = raw.values;
  const current = vals[vals.length - 1];
  const first = vals[0];
  const delta = current - first;
  const deltaPct = first !== 0 ? (delta / Math.abs(first)) * 100 : null;
  const fmt = v => '$' + Math.abs(v).toLocaleString('en-US', { minimumFractionDigits: 2 });
  const sign = delta >= 0 ? '+' : '-';
  const deltaColor = delta >= 0 ? 'text-green-600' : 'text-red-600';
  const pctStr = deltaPct !== null ? ` (${sign}${Math.abs(deltaPct).toFixed(1)}%)` : '';
  const strip = document.getElementById('nw-summary');
  strip.classList.remove('hidden');
  strip.innerHTML = `
    <span class="text-gray-500">Current <span class="font-semibold text-gray-900">${fmt(current)}</span></span>
    <span class="text-gray-300 hidden sm:inline">·</span>
    <span class="text-gray-500 hidden sm:inline">Period start <span class="font-medium text-gray-700">${fmt(first)}</span></span>
    <span class="text-gray-300 hidden sm:inline">·</span>
    <span class="text-gray-500 hidden sm:inline">Change <span class="font-semibold ${deltaColor}">${sign}${fmt(delta)}${pctStr}</span></span>
    <span class="text-gray-300 hidden sm:inline">·</span>
    <span class="text-gray-400 text-xs hidden sm:inline">${raw.labels[0]} – ${raw.labels[vals.length - 1]}</span>
  `;

  const sparse = raw.labels.length > 60;
  new Chart(document.getElementById('netWorthChart'), {
    type: 'line',
    data: {
      labels: raw.labels,
      datasets: [
        {
          label: 'Net Worth',
          data: raw.values,
          borderColor: 'rgb(99, 102, 241)',
          backgroundColor: 'rgba(99, 102, 241, 0.08)',
          fill: true,
          tension: 0.2,
          pointRadius: sparse ? 0 : 3,
          borderWidth: 2,
          order: 1,
        },
        ...(raw.assets ? [{
          label: 'Assets',
          data: raw.assets,
          borderColor: 'rgb(16, 185, 129)',
          backgroundColor: 'transparent',
          fill: false,
          tension: 0.2,
          pointRadius: 0,
          borderWidth: 1.5,
          borderDash: [4, 3],
          order: 2,
        }] : []),
        ...(raw.liabilities ? [{
          label: 'Liabilities',
          data: raw.liabilities,
          borderColor: 'rgb(239, 68, 68)',
          backgroundColor: 'transparent',
          fill: false,
          tension: 0.2,
          pointRadius: 0,
          borderWidth: 1.5,
          borderDash: [4, 3],
          order: 3,
        }] : []),
      ]
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: true, position: 'top', labels: { font: { size: 11 }, boxWidth: 20 } },
        tooltip: {
          callbacks: {
            label: ctx => '$' + ctx.parsed.y.toLocaleString('en-US', { minimumFractionDigits: 2 })
          }
        }
      },
      scales: {
        x: {
          ticks: {
            maxTicksLimit: 12,
            font: { size: 11 }
          }
        },
        y: {
          ticks: {
            callback: v => '$' + v.toLocaleString('en-US', { notation: 'compact' }),
            font: { size: 11 }
          }
        }
      }
    }
  });
})();
</script>
{% endblock %}
